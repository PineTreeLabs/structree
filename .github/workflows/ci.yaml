name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install the project
      run: uv sync --dev

    - name: Force-install archimedes on Python 3.9
      if: matrix.python-version == '3.9'
      run: uv pip install --no-deps --ignore-requires-python archimedes

    - name: Run tests
      run: uv run pytest

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"

    - name: Install the project
      run: uv sync --dev

    - name: MyPy type checking
      run: uv run mypy src/

    - name: Lint with ruff
      run: |
        uv run ruff check .
        uv run ruff format --check .
